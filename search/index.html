    <main>
        




    
    
    
    <div class="list-page-container">
        <header class="list-header">
            
            <h1 class="list-title" id="search-page-title"></h1>
        </header>
        
        <div id="search-page-results"></div>
        <nav id="search-page-pagination" class="pagination-nav"></nav>
    </div>

    
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const titleEl = document.getElementById('search-page-title');
        const resultsEl = document.getElementById('search-page-results');
        const paginationEl = document.getElementById('search-page-pagination');
        let searchData = [];
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        
        if (!query) {
            titleEl.textContent = "검색어가 없습니다.";
            return;
        }

        
        titleEl.innerHTML = `「<span class="color-accent">${query}</span>」에 대한 검색 결과`;

        try {
            const response = await fetch('\/index.json');
            searchData = await response.json();
        } catch (e) {
            resultsEl.innerHTML = "<p>검색 데이터를 불러오는 데 실패했습니다.</p>";
            return;
        }

        const lowerCaseQuery = query.toLowerCase();
        const allResults = searchData.filter(post => 
            post.title.toLowerCase().includes(lowerCaseQuery) || 
            post.content.toLowerCase().includes(lowerCaseQuery)
        );

        const resultsPerPage = 20;
        const totalPages = Math.ceil(allResults.length / resultsPerPage);
        let currentPage = 1;

        const renderPage = (page) => {
            currentPage = page;
            resultsEl.innerHTML = '';
            paginationEl.innerHTML = '';

            if (allResults.length === 0) {
                resultsEl.innerHTML = '<p class="no-results" style="text-align: center; padding: 2rem 0;">검색 결과가 없습니다.</p>';
                return;
            }

            const start = (page - 1) * resultsPerPage;
            const end = start + resultsPerPage;
            const pageResults = allResults.slice(start, end);

            const resultList = document.createElement('ul');
            
            resultList.className = 'list-page-post-list'; 
            
            pageResults.forEach(post => {
                const li = document.createElement('li');
                
                li.innerHTML = `<a href="${post.permalink}"><span class="list-page-post-title">${post.title}</span><div class="list-page-post-meta"><span class="summary">${post.content.substring(0, 70)}...</span></div></a>`;
                resultList.appendChild(li);
            });
            resultsEl.appendChild(resultList);

            if (totalPages > 1) {
                paginationEl.innerHTML = `<a href="#" class="pagination-arrow prev ${currentPage === 1 ? 'disabled' : ''}" data-page="${currentPage - 1}">◀</a><span class="page-indicator">${currentPage} / ${totalPages}</span><a href="#" class="pagination-arrow next ${currentPage === totalPages ? 'disabled' : ''}" data-page="${currentPage + 1}">▶</a>`;
            }
        };

        paginationEl.addEventListener('click', (e) => {
            e.preventDefault();
            const target = e.target.closest('.pagination-arrow');
            if (target && !target.classList.contains('disabled')) {
                renderPage(parseInt(target.dataset.page));
            }
        });

        renderPage(1);
    });
    </script>




    </main>

                    <button class="theme-btn" data-theme="cosmic-indigo" aria-label="Cosmic Indigo Theme"><span class="color-patch" style="background-color: #1A182F;"></span><span class="color-patch" style="background-color: #F0C419;"></span></button>
                    <button class="theme-btn" data-theme="aetherial-light" aria-label="Aetherial Light Theme"><span class="color-patch" style="background-color: #F8F9FA;"></span><span class="color-patch" style="background-color: #A0D2DB;"></span></button>
                </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const themeButtons = document.querySelectorAll('.theme-btn');
        const body = document.body;
        const giscusThemeMap = { 'default': 'dark_dimmed', 'cosmic-indigo': 'dark_dimmed', 'aetherial-light': 'light' };
        
        const updateGiscusTheme = (themeName) => {
            const giscusFrame = document.querySelector('iframe.giscus-frame');
            if (!giscusFrame) return;
            const giscusTheme = giscusThemeMap[themeName] || 'dark_dimmed';
            
            setTimeout(() => { 
                giscusFrame.contentWindow.postMessage({ giscus: { setConfig: { theme: giscusTheme } } }, 'https://giscus.app');
            }, 100);
        };
        
        const applyTheme = (themeName) => {
            if (!themeName) return;
            body.setAttribute('data-theme', themeName);
            themeButtons.forEach(btn => { 
                btn.classList.toggle('active', btn.dataset.theme === themeName); 
            });
            updateGiscusTheme(themeName);
        };

        const savedTheme = localStorage.getItem('archive03-theme') || 'default';
        applyTheme(savedTheme);

        themeButtons.forEach(button => {
            button.addEventListener('click', () => {
                const selectedTheme = button.dataset.theme;
                applyTheme(selectedTheme);
                localStorage.setItem('archive03-theme', selectedTheme);
            });
        });

        const commentsSection = document.querySelector('.post-comments');
        if (commentsSection) {
            const observer = new IntersectionObserver((entries, obs) => {
                if (entries[0].isIntersecting) {
                    const applyGiscusThemeOnLoad = () => {
                        const giscusFrame = document.querySelector('iframe.giscus-frame');
                        if (giscusFrame) {
                            const currentTheme = localStorage.getItem('archive03-theme') || 'default';
                            updateGiscusTheme(currentTheme);
                        } else {
                            setTimeout(applyGiscusThemeOnLoad, 200); 
                        }
                    };
                    applyGiscusThemeOnLoad();
                    obs.disconnect();
                }
            }, { threshold: 0.01 });
            observer.observe(commentsSection);
        }
    });
    </script>
</body>
